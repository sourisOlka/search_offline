name: CI

on: [push]

jobs:
  frontend-check:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Code Style (Prettier)
        run: npx prettier --check .

      - name: Linter (ESLint)
        run: npm run lint

      - name: Types (TSC)
        run: npx tsc --noEmit

      - name: Tests (Jest)
        run: npx jest --ci
